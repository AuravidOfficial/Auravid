<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Auravid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">

<header class="login-header">
    <a href="index.html" class="auravid-logo-link">
        <img src="img/auravidlogo.png" alt="Auravid Logo" class="auravid-logo-img" />
    </a>
    <span class="secure-tag">SECURE ACCESS</span>
</header>

    <main class="login-main">
        <div class="ambient-glow"></div>

        <div class="login-container">
            <div class="glass-panel login-card">

                <div class="login-title-box">
                    <h1 class="login-title">Sign in</h1>
                    <p class="login-subtitle">Access your Auravid dashboard</p>
                </div>

                <div id="error-msg" class="error-banner hidden">
                    Wrong password. Try again or click 'Forgot password?' for more options
                </div>

                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input id="email" type="email" required placeholder="you@company.com" class="input-field" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input id="password" type="password" required placeholder="••••••••" class="input-field" />
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" class="checkbox">
                            Remember me
                        </label>
                        <a href="forgot-password.html" class="forgot-link" style="text-decoration: none; color: inherit; cursor: pointer;">
    Forgot password?
                    </a>
                    </div>

                    <button type="submit" class="btn-auth">
                        Authenticate
                    </button>
                </form>

                <footer class="login-footer">
                    GDPR • ISO 14064 • Hosted in Sweden
                </footer>

            </div>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
