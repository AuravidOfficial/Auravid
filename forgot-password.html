<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password – Auravid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/forgot-password.css">
</head>

<body class="login-body">

<header class="login-header">
    <a href="index.html" class="auravid-logo-link">
        <img src="img/auravidlogo.png" alt="Auravid Logo" class="auravid-logo-img" />
    </a>
    <span class="secure-tag">SECURE ACCESS</span>
</header>

    <main class="login-main">
        <div class="ambient-glow"></div>

        <div class="login-container">
            <div class="glass-panel login-card">

                <div class="login-title-box">
                    <h1 class="login-title">Reset Password</h1>
                    <p class="login-subtitle">Enter your email to receive reset instructions</p>
                </div>

                <div id="success-msg" class="success-banner hidden">
                    <span class="icon">✓</span> Email sent! Check your inbox for the reset link.
                </div>

                <div id="error-msg" class="error-banner hidden">
                    Email not found. Please try again.
                </div>

                <form id="forgot-form" class="login-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input id="email" type="email" required placeholder="you@company.com" class="input-field" />
                    </div>

                    <button type="submit" class="btn-auth">
                        Send Reset Link
                    </button>

                    <div class="back-to-login">
                        <a href="login.html" class="back-link">
                            ← Back to Sign in
                        </a>
                    </div>
                </form>

                <footer class="login-footer">
                    GDPR • ISO 14064 • Hosted in Sweden
                </footer>

            </div>
        </div>
    </main>

    <script src="js/forgot-password.js"></script>
</body>
</html>
